name: Build oxc daily jar

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  daily:
    name: Build daily
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/kolmafia/kolmafia
          git fetch upstream

      - name: Setup Java 16
        uses: actions/setup-java@v2
        with:
          distribution: "temurin"
          java-version: "16"

      - name: Gradle Wrapper Validation
        uses: gradle/wrapper-validation-action@v1

      - name: Build
        run: ./gradlew --no-daemon ant_daily

      - name: Get revision
        id: revision
        run: |
          REVISION=$(ant version | grep -Poe "(?<=Current revision: )\S*")
          echo "::set-output name=revision::$REVISION"
          echo "::set-output name=filename::KoLmafia-$REVISION.jar"

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "KoLmafia ${{ steps.revision.outputs.revision }}"
          files: |
            dist/${{ steps.revision.outputs.filename }}
